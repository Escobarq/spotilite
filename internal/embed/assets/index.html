<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spotilite</title>
<link rel="icon" href="data:," />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #121212;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    box-sizing: border-box;
  }
  *, *::before, *::after { box-sizing: border-box; }
  #app {
    width: 100%;
    height: 100vh;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: #b3b3b3;
  }
  .splash__logo {
    width: 56px;
    height: 56px;
    background: #1db954;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: #000000;
    line-height: 1;
  }
  .splash__text {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .splash__spinner {
    width: 24px;
    height: 24px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #1db954;
    border-radius: 50%;
    animation: spotilite-spin 0.9s linear infinite;
  }
  @keyframes spotilite-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <div class="splash">
    <div class="splash__logo">S</div>
    <div class="splash__spinner" aria-hidden="true"></div>
    <div class="splash__text">Loading Spotify&hellip;</div>
  </div>
</div>
</body>
</html>
