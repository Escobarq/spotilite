<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1DB954"/>
      <stop offset="100%" stop-color="#1ed760"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#2ee670" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1DB954" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="240"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
    <circle cx="256" cy="256" r="240" fill="url(#centerGlow)"/>
  </g>

  <g clip-path="url(#circleClip)">

    <g transform="translate(256,200)" filter="url(#glow)">
      <ellipse cx="0" cy="60" rx="28" ry="22" fill="#fff" fill-opacity="0.95"/>
      <rect x="-6" y="-70" width="12" height="90" rx="6" fill="#fff" fill-opacity="0.95"/>
      <path d="M6 -70 Q6 -70 40 -90" stroke="#fff" stroke-width="10" fill="none" stroke-linecap="round" fill-opacity="0.95"/>
      <circle cx="40" cy="-90" r="18" fill="#fff" fill-opacity="0.95"/>
    </g>

    <g transform="translate(256,200) scale(0.6)" filter="url(#glow)">
      <ellipse cx="0" cy="60" rx="28" ry="22" fill="#fff" fill-opacity="0.15"/>
      <rect x="-6" y="-70" width="12" height="90" rx="6" fill="#fff" fill-opacity="0.15"/>
      <path d="M6 -70 Q6 -70 40 -90" stroke="#fff" stroke-width="10" fill="none" stroke-linecap="round" fill-opacity="0.15"/>
      <circle cx="40" cy="-90" r="18" fill="#fff" fill-opacity="0.15"/>
    </g>

    <g transform="translate(256,440)">
      <rect x="-80" y="-5" width="160" height="10" rx="5" fill="#fff" fill-opacity="0.2"/>
      <rect x="-80" y="-5" width="55" height="10" rx="5" fill="#fff" fill-opacity="0.65"/>
      <circle cx="-25" cy="0" r="7" fill="#fff" fill-opacity="0.9"/>
    </g>

    <g transform="translate(120,260)" opacity="0.4">
      <rect x="0" y="8" width="5" height="24" rx="2.5" fill="#fff">
        <animate attributeName="height" values="24;40;24" dur="1.2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="8;0;8" dur="1.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="10" y="2" width="5" height="36" rx="2.5" fill="#fff">
        <animate attributeName="height" values="36;18;36" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="y" values="2;11;2" dur="1s" repeatCount="indefinite"/>
      </rect>
      <rect x="20" y="10" width="5" height="20" rx="2.5" fill="#fff">
        <animate attributeName="height" values="20;34;20" dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="y" values="10;3;10" dur="1.4s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g transform="translate(370,260)" opacity="0.4">
      <rect x="0" y="5" width="5" height="30" rx="2.5" fill="#fff">
        <animate attributeName="height" values="30;15;30" dur="1.1s" repeatCount="indefinite"/>
        <animate attributeName="y" values="5;12;5" dur="1.1s" repeatCount="indefinite"/>
      </rect>
      <rect x="10" y="12" width="5" height="16" rx="2.5" fill="#fff">
        <animate attributeName="height" values="16;34;16" dur="1.3s" repeatCount="indefinite"/>
        <animate attributeName="y" values="12;3;12" dur="1.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="20" y="3" width="5" height="34" rx="2.5" fill="#fff">
        <animate attributeName="height" values="34;16;34" dur="0.9s" repeatCount="indefinite"/>
        <animate attributeName="y" values="3;12;3" dur="0.9s" repeatCount="indefinite"/>
      </rect>
    </g>

  </g>

  <text x="256" y="485" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="36" font-weight="bold" fill="#fff" letter-spacing="4" opacity="0.85">SPOTILITE</text>
</svg>
